services:
  nuclei-akto-bridge:
    build: .
    container_name: nuclei-akto-bridge
    restart: unless-stopped
    environment:
      - MONGO_URI=${MONGO_URI:-mongodb://mongo:27017/akto}
      - NUCLEI_TARGET_COLLECTION_ID=${NUCLEI_TARGET_COLLECTION_ID:-0}
      - TARGET_SCHEME=${TARGET_SCHEME:-http}
      - TARGET_HOST=${TARGET_HOST:-localhost}
      - TARGET_PORT=${TARGET_PORT:-80}
      - SCAN_TIMEOUT=${SCAN_TIMEOUT:-600}
      - REQUEST_TIMEOUT=${REQUEST_TIMEOUT:-10}
      - MAX_CONCURRENCY=${MAX_CONCURRENCY:-25}
      - POLL_INTERVAL=${POLL_INTERVAL:-5}
      - NUCLEI_BIN=${NUCLEI_BIN:-nuclei}
      - NUCLEI_TEMPLATES=${NUCLEI_TEMPLATES:-}
      - NUCLEI_SEVERITY=${NUCLEI_SEVERITY:-high,medium}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_JSON=${LOG_JSON:-true}
    depends_on:
      - mongo
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "2.0"
        reservations:
          memory: 256m
          cpus: "0.5"
    networks:
      - akto-net

  mongo:
    image: mongo:7
    container_name: nuclei-akto-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
    networks:
      - akto-net

volumes:
  mongo-data:

networks:
  akto-net:
    driver: bridge
