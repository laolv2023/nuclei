version: '3.8'
services:
  nuclei-bridge:
    build: ./nuclei-akto-bridge
    environment:
      MONGO_URI: mongodb://mongo:27017/akto
      NUCLEI_TARGET_COLLECTION_ID: "123456"
      TARGET_SCHEME: "http"
      TARGET_HOST: "target-app"
      TARGET_PORT: "80"
      SCAN_TIMEOUT: "600"
      REQUEST_TIMEOUT: "10"
      MAX_CONCURRENCY: "25"
      POLL_INTERVAL: "5"
      DEFAULT_TEMPLATES: "cves/,misconfiguration/,exposures/,default-logins/"
      LOG_LEVEL: "INFO"
    depends_on:
      - mongo
    networks:
      - akto-network
    restart: always

  mongo:
    image: mongo:4.4
    networks:
      - akto-network
    restart: always

networks:
  akto-network:
    external: true
    name: akto_akto-net
